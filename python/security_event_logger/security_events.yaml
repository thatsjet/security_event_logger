version: "1.1.0"
# Reconciled to Logging_Vocabulary_Cheat_Sheet.md (the canonical vocabulary).
# Changes vs 1.0: file_* renamed to upload_*; malicious_* family aligned to the
# cheat sheet (malicious_excess_404/_extraneous/_attack_tool/_direct_reference);
# levels corrected to match the sheet (authz_fail, authn_password_change_fail,
# sequence_fail, authn_token_reuse, malicious_cors -> CRITICAL); added crypt_*,
# mcp_*, authn_impossible_travel, authn_token_delete, input_validation_discrete_fail,
# session_use_after_expire; input_validation_fail no longer carries the rejected
# VALUE (field names + userid only — per the sheet's privacy guidance). Retained
# from 1.0 and now also proposed for the cheat sheet: malicious_csrf,
# session_logout, excess_sessions_exceeded. NEW: malicious_csp_violation.
events:
  # --- Authentication [AUTHN] ---
  authn_login_success:
    category: "Authentication"
    prefix: "authn"
    level: "INFO"
    description: "All login events should be recorded including success"
    parameters:
      - "userid"
  authn_login_successafterfail:
    category: "Authentication"
    prefix: "authn"
    level: "INFO"
    description: "The user successfully logged in after previously failing"
    parameters:
      - "userid"
      - "retries"
  authn_login_fail:
    category: "Authentication"
    prefix: "authn"
    level: "WARN"
    description: "All login events should be recorded including failure"
    parameters:
      - "userid"
  authn_login_fail_max:
    category: "Authentication"
    prefix: "authn"
    level: "WARN"
    description: "User reached the login fail limit"
    parameters:
      - "userid"
      - "maxlimit"
  authn_login_lock:
    category: "Authentication"
    prefix: "authn"
    level: "WARN"
    description: "The user account has been locked after x retries or other condition"
    parameters:
      - "userid"
      - "reason"
  authn_password_change:
    category: "Authentication"
    prefix: "authn"
    level: "INFO"
    description: "User has successfully changed their password"
    parameters:
      - "userid"
  authn_password_change_fail:
    category: "Authentication"
    prefix: "authn"
    level: "CRITICAL"
    description: "An attempt to change a password failed"
    parameters:
      - "userid"
  authn_impossible_travel:
    category: "Authentication"
    prefix: "authn"
    level: "CRITICAL"
    description: "User accessed the application from two distant locations too far apart to have traveled in the time elapsed — potential account takeover"
    parameters:
      - "userid"
      - "region1"
      - "region2"
  authn_token_created:
    category: "Authentication"
    prefix: "authn"
    level: "INFO"
    description: "A token was created for service access"
    parameters:
      - "userid"
      - "entitlements"
  authn_token_revoked:
    category: "Authentication"
    prefix: "authn"
    level: "INFO"
    description: "A token has been revoked for the given account"
    parameters:
      - "userid"
      - "tokenid"
  authn_token_reuse:
    category: "Authentication"
    prefix: "authn"
    level: "CRITICAL"
    description: "A previously revoked token was attempted to be reused"
    parameters:
      - "userid"
      - "tokenid"
  authn_token_delete:
    category: "Authentication"
    prefix: "authn"
    level: "WARN"
    description: "A token was deleted"
    parameters:
      - "appid"
  # --- Authorization [AUTHZ] ---
  authz_fail:
    category: "Authorization"
    prefix: "authz"
    level: "CRITICAL"
    description: "An attempt was made to access a resource which was unauthorized"
    parameters:
      - "userid"
      - "resource"
  authz_change:
    category: "Authorization"
    prefix: "authz"
    level: "WARN"
    description: "The user or entity entitlements were changed"
    parameters:
      - "userid"
      - "from"
      - "to"
  authz_admin:
    category: "Authorization"
    prefix: "authz"
    level: "WARN"
    description: "All activity by privileged users such as admin should be recorded"
    parameters:
      - "userid"
      - "event"
  # --- Encryption/Decryption [CRYPT] ---
  crypt_decrypt_fail:
    category: "Encryption/Decryption"
    prefix: "crypt"
    level: "WARN"
    description: "Failure to perform decryption, possibly a system error or an authorization failure on the related data"
    parameters:
      - "userid"
  crypt_encrypt_fail:
    category: "Encryption/Decryption"
    prefix: "crypt"
    level: "WARN"
    description: "Failure to perform encryption, possibly a system error or an authorization failure on the related data"
    parameters:
      - "userid"
  # --- Excessive Use [EXCESS] ---
  excess_rate_limit_exceeded:
    category: "Excessive Use"
    prefix: "excess"
    level: "WARN"
    description: "Expected service limit ceiling was exceeded"
    parameters:
      - "userid"
      - "max"
  excess_sessions_exceeded:
    category: "Excessive Use"
    prefix: "excess"
    level: "WARN"
    description: "User exceeded the maximum number of concurrent sessions"
    parameters:
      - "userid"
      - "max"
  # --- File Upload [UPLOAD] ---
  upload_complete:
    category: "File Upload"
    prefix: "upload"
    level: "INFO"
    description: "A file upload completed — first step in the validation process"
    parameters:
      - "userid"
      - "filename"
      - "type"
  upload_stored:
    category: "File Upload"
    prefix: "upload"
    level: "INFO"
    description: "An uploaded file was moved/renamed and stored; never reference the original filename in downloads"
    parameters:
      - "filename"
      - "from"
      - "to"
  upload_validation:
    category: "File Upload"
    prefix: "upload"
    level: "INFO"
    description: "An uploaded file was validated for correctness and safety (e.g. virus scan, imagemagick)"
    parameters:
      - "filename"
      - "result"
  upload_delete:
    category: "File Upload"
    prefix: "upload"
    level: "INFO"
    description: "A file was marked for deletion for normal reasons"
    parameters:
      - "userid"
      - "fileid"
  # --- Input Validation [INPUT] ---
  input_validation_fail:
    category: "Input Validation"
    prefix: "input"
    level: "WARN"
    description: "Server-side input validation failed — log the field name(s), never the rejected value"
    parameters:
      - "fields"
      - "userid"
  input_validation_discrete_fail:
    category: "Input Validation"
    prefix: "input"
    level: "WARN"
    description: "Server-side validation of a value against a discrete option set (dropdown, radio) failed — strong indicator of client-side tampering"
    parameters:
      - "field"
      - "userid"
  # --- Malicious Behavior [MALICIOUS] ---
  malicious_excess_404:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "WARN"
    description: "A user generated numerous requests for files that do not exist — often force-browsing for files that could exist"
    parameters:
      - "userid|IP"
      - "useragent"
  malicious_extraneous:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "CRITICAL"
    description: "A user submitted data to a backend handler that was not expected — probing for input validation errors"
    parameters:
      - "userid|IP"
      - "inputname"
      - "useragent"
  malicious_attack_tool:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "CRITICAL"
    description: "An obvious attack tool was identified by signature or user agent (e.g. Nikto)"
    parameters:
      - "userid|IP"
      - "toolname"
      - "useragent"
  malicious_cors:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "CRITICAL"
    description: "A cross-origin request was made from an unauthorized origin (note: 'referer' misspelling is intentional per the HTTP spec)"
    parameters:
      - "userid|IP"
      - "useragent"
      - "referer"
  malicious_direct_reference:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "CRITICAL"
    description: "An attempt was made to directly access an object without credentials or appropriate access authority (IDOR)"
    parameters:
      - "userid|IP"
      - "useragent"
  malicious_sqli:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "CRITICAL"
    description: "Request input matched a SQL injection (SQLi) signature or heuristic. Log a detection rule ID / category and parameter name — never the full payload"
    parameters:
      - "userid|IP"
      - "parameter"
      - "ruleid"
      - "useragent"
  malicious_csrf:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "WARN"
    description: "A potential cross-site request forgery (CSRF) attempt was detected (e.g. missing/invalid anti-CSRF token on a state-changing request)"
    parameters:
      - "userid|IP"
  malicious_csp_violation:
    category: "Malicious Behavior"
    prefix: "malicious"
    level: "WARN"
    description: "The browser reported a Content-Security-Policy violation. In Report-Only mode this is noisy (benign extension/browser noise); promote to CRITICAL only when enforced-mode blocks are treated as attack signal. Log the directive and blocked URI (query string stripped), never the full report verbatim"
    parameters:
      - "ip"
      - "effective_directive"
      - "blocked_uri"
      - "useragent"
  # --- MCP Servers [MCP] ---
  mcp_prompt_injection:
    category: "MCP Servers"
    prefix: "mcp"
    level: "WARN"
    description: "An MCP client or server detected indicators of prompt injection. Log a detection category or rule ID and the target tool — never the full prompt/tool I/O"
    parameters:
      - "userid"
  mcp_resource_exhaustion:
    category: "MCP Servers"
    prefix: "mcp"
    level: "WARN"
    description: "An MCP request pattern intended to exhaust resources was detected. Log measured usage and thresholds — never full prompts or tool I/O"
    parameters:
      - "userid"
  mcp_tool_poisoning:
    category: "MCP Servers"
    prefix: "mcp"
    level: "WARN"
    description: "An MCP tool may be malicious or tampered with (unexpected change, signature/hash failure, low-validation marketplace source)"
    parameters:
      - "userid"
  # --- Privilege Changes [PRIVILEGE] ---
  privilege_permissions_changed:
    category: "Privilege Changes"
    prefix: "privilege"
    level: "WARN"
    description: "Access-control restrictions on a file/object were changed — can uncover privilege-escalation attempts"
    parameters:
      - "userid"
      - "object"
      - "fromlevel"
      - "tolevel"
  # --- Sensitive Data Changes [DATA] ---
  sensitive_create:
    category: "Sensitive Data"
    prefix: "sensitive"
    level: "WARN"
    description: "A new piece of data marked sensitive was created"
    parameters:
      - "userid"
      - "object"
  sensitive_read:
    category: "Sensitive Data"
    prefix: "sensitive"
    level: "WARN"
    description: "Data marked sensitive was read"
    parameters:
      - "userid"
      - "object"
  sensitive_update:
    category: "Sensitive Data"
    prefix: "sensitive"
    level: "WARN"
    description: "Data marked sensitive was updated"
    parameters:
      - "userid"
      - "object"
  sensitive_delete:
    category: "Sensitive Data"
    prefix: "sensitive"
    level: "WARN"
    description: "Data marked sensitive was marked for deletion (retain an archive per legal/privacy requirements)"
    parameters:
      - "userid"
      - "object"
  # --- Sequence Errors [SEQUENCE] ---
  sequence_fail:
    category: "Sequence"
    prefix: "sequence"
    level: "CRITICAL"
    description: "A user reached a part of the application out of the normal flow — possible business-logic abuse"
    parameters:
      - "userid"
  # --- Session Management [SESSION] ---
  session_created:
    category: "Session Management"
    prefix: "session"
    level: "INFO"
    description: "A new authenticated session was created"
    parameters:
      - "userid"
  session_renewed:
    category: "Session Management"
    prefix: "session"
    level: "INFO"
    description: "A user was warned of an expiring session and chose to extend it"
    parameters:
      - "userid"
  session_expired:
    category: "Session Management"
    prefix: "session"
    level: "INFO"
    description: "A session expired; reason may be logout, timeout, revoked, etc. Sessions should be expired, never deleted"
    parameters:
      - "userid"
      - "reason"
  session_logout:
    category: "Session Management"
    prefix: "session"
    level: "INFO"
    description: "A user explicitly logged out"
    parameters:
      - "userid"
      - "sessionid"
  session_use_after_expire:
    category: "Session Management"
    prefix: "session"
    level: "CRITICAL"
    description: "A user attempted to access systems with an expired session — possible session hijack or shared-machine access"
    parameters:
      - "userid"
  # --- System Events [SYS] ---
  sys_startup:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "A system instance was started"
    parameters:
      - "userid"
  sys_shutdown:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "A system instance was shut down"
    parameters:
      - "userid"
  sys_restart:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "A system instance was restarted"
    parameters:
      - "userid"
  sys_crash:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "The system crashed, possibly triggered by an attack"
    parameters:
      - "reason"
  sys_monitor_disabled:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "A security/integrity/logging/virus monitor agent was disabled"
    parameters:
      - "userid"
      - "monitor"
  sys_monitor_enabled:
    category: "System Events"
    prefix: "sys"
    level: "WARN"
    description: "A security/integrity/logging/virus monitor agent was (re)enabled"
    parameters:
      - "userid"
      - "monitor"
  # --- User Management [USER] ---
  user_created:
    category: "User Management"
    prefix: "user"
    level: "WARN"
    description: "A new user was created, especially relevant if creatable with admin privileges"
    parameters:
      - "userid"
      - "newuserid"
      - "attributes"
  user_updated:
    category: "User Management"
    prefix: "user"
    level: "WARN"
    description: "A user was updated, especially relevant if updatable with admin privileges"
    parameters:
      - "userid"
      - "onuserid"
      - "attributes"
  user_archived:
    category: "User Management"
    prefix: "user"
    level: "WARN"
    description: "A user was archived (prefer archiving over deletion); could be abused to deny service"
    parameters:
      - "userid"
      - "onuserid"
  user_deleted:
    category: "User Management"
    prefix: "user"
    level: "WARN"
    description: "A user was deleted (prefer archiving over deletion); could be abused to deny service"
    parameters:
      - "userid"
      - "onuserid"
